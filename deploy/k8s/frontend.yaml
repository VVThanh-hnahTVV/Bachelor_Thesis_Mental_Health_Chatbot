apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: helios
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${FRONTEND_IMAGE}
          ports:
            - containerPort: 3000
          env:
            # Next.js server-side gọi backend qua DNS nội bộ cluster.
            - name: BACKEND_API_URL
              value: "http://backend:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: helios
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
