apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: helios
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "320Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: helios
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
